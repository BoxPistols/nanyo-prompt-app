name: Sync Nanyo City Prompt Data

on:
  # 毎日 JST 9:00 (UTC 0:00) に実行
  schedule:
    - cron: '0 0 * * *'
  # 手動実行も可能
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run sync script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scraper/sync_upstream.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet src/data/ scraper/upstream_meta.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/ scraper/upstream_meta.json
          git commit -m "feat: sync Nanyo City prompt data (auto-update)"
          git push
